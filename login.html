<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg view-box="0 0 20 20" fill="none">
                    <path d="M4 10C4 6.5 7 3.5 10 2C13 3.5 16 6.5 16 10C16 13.3 13.3 16 10 16C6.7 16 4 13.3 4 10Z" fill="white" opacity="0.25"/>
                    <path d="M10 6V11M7.5 8.5H12.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                   </svg>
                   </div>
                   <span class="logo-text">Expense Tracker</span>
                   </div>

                   <div class="card">
                    <div class="card-header">
                    <h1>Selamat Datang</h1>
                    <p>Masuk Untuk Melihat Catatan Keunganmu</p>
                    </div>
                    <div class="balance-preview">
                    <div class="icon"> 💰 </div>
                    <div class="info">
                        <p> Saldo Bulan Ini </p>
                            <span> Rp 0 </span>
                            </div>
                            </div>
                            <form>
                                 <div class="field">
                                      <label>Email</label>
                                         <input type="email" id="email" placeholder="Masukan Email Kamu" />
                                           </div>
                                             <div class="field">
                                               <div class="field-row">
                                                 <label>Password</label>
                                                       <a href="#" class="forgot">Lupa Password?</a>
                                                             </div>
                                                                   <input type="password" id="password" placeholder="••••••••" />
                                                                        </div>

                                                                           <button type="submit" class="btn">Masuk</button>
                                                                                       </form>
                           

                                            <div class="divider">Atau</div>
                                            <div class="switch-link">
                                                Belum Punya Akun? <a href="register.html">Daftar</a>
                                            </div>
                                        </div>
                                         </div>
                                         <script type="module" src="login.js"></script>
                                          </body>
                                            </html>
