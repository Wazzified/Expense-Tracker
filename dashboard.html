<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="dash">

    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-icon">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M4 10C4 6.5 7 3.5 10 2C13 3.5 16 6.5 16 10C16 13.3 13.3 16 10 16C6.7 16 4 13.3 4 10Z" fill="white" opacity="0.25"/>
            <path d="M10 6V11M7.5 8.5H12.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="app-name">Expense Tracker</span>
      </div>
      <div class="topbar-right">
        <span class="greeting">Halo, <strong id="user-name">User</strong></span>
        <a href="profile.html" class="profile-link">👤</a>
        <button class="toggle-dark" id="toggle-dark">🌙</button>
        <button class="logout-btn" id="logout-btn">Keluar</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Saldo</div>
        <div class="card-value" id="saldo">Rp 0</div>
        <div class="card-badge">Pemasukan - Pengeluaran</div>
      </div>
      <div class="card">
        <div class="card-label">Pemasukan</div>
        <div class="card-value green" id="pemasukan">Rp 0</div>
        <button class="card-btn" id="btn-pemasukan">+ Tambah Pemasukan</button>
      </div>
      <div class="card">
        <div class="card-label">Pengeluaran</div>
        <div class="card-value red" id="pengeluaran">Rp 0</div>
        <button class="card-btn" id="btn-pengeluaran">+ Tambah Pengeluaran</button>
      </div>
    </div>

    <div class="bottom">
      <div class="panel">
        <div class="panel-title">Pengeluaran per kategori</div>
        <div class="bar-wrap" id="bar-wrap">
          <div class="empty-state">Belum ada transaksi</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Transaksi terbaru</div>
        <div class="tx-list" id="tx-list">
          <div class="empty-state">Belum ada transaksi</div>
        </div>
      </div>
    </div>

    <div class="panel chart-panel">
      <div class="panel-title">Grafik bulanan</div>
      <canvas id="chart-bulanan" height="100"></canvas>
    </div>

  </div>

  <!-- Modal Tambah Transaksi -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Tambah Transaksi</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="tx-form">
        <input type="hidden" id="tx-type" value="expense" />
        <div class="field">
          <label>Jumlah (Rp)</label>
          <input type="number" id="tx-amount" placeholder="Contoh: 50000" />
        </div>
        <div class="field" id="category-field">
          <label id="category-label">Kategori</label>
          <select id="tx-category"></select>
        </div>
        <div class="field">
          <label>Catatan</label>
          <input type="text" id="tx-note" placeholder="" />
        </div>
        <div class="field">
          <label>Tanggal</label>
          <input type="date" id="tx-date" />
        </div>
        <button type="submit" class="add-btn">Simpan</button>
      </form>
    </div>
  </div>

  <!-- Modal Edit Transaksi -->
  <div class="modal-overlay" id="edit-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Transaksi</h2>
        <button class="modal-close" id="edit-close">✕</button>
      </div>
      <form id="edit-form">
        <input type="hidden" id="edit-id" />
        <input type="hidden" id="edit-type" />
        <div class="field">
          <label>Jumlah (Rp)</label>
          <input type="number" id="edit-amount" placeholder="Contoh: 50000" />
        </div>
        <div class="field" id="edit-category-field">
          <label id="edit-category-label">Kategori</label>
          <select id="edit-category"></select>
        </div>
        <div class="field">
          <label>Catatan</label>
          <input type="text" id="edit-note" placeholder="" />
        </div>
        <div class="field">
          <label>Tanggal</label>
          <input type="date" id="edit-date" />
        </div>
        <button type="submit" class="add-btn">Simpan perubahan</button>
      </form>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
